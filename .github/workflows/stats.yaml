name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=daniellealpimenta&theme=dark&hide_border=true&include_all_commits=true&count_private=true&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=daniellealpimenta&theme=dark&hide_border=true&layout=compact
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: lowlighter/metrics@latest
        with:
          filename: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_lines: yes
          plugin_stresk: yes
          plugin_metrics_custom: |
            https://github-readme-streak-stats.herokuapp.com/?user=daniellealpimenta&theme=dark&hide_border=true

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          # O pull com rebase garante que o Action pegue suas mudanças do README antes de postar as fotos
          git pull --rebase origin main
          git commit -m "Update README cards" || exit 0
          git push
