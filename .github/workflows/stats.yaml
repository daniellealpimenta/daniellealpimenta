name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Main Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=daniellealpimenta&theme=dark&hide_border=true&include_all_commits=true&count_private=true&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=daniellealpimenta&theme=dark&hide_border=true&layout=compact
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Streak and Contributors via Curl
        run: |
          mkdir -p profile
          curl -o profile/streak.svg "https://nirzak-streak-stats.vercel.app/?user=daniellealpimenta&theme=dark&hide_border=true"
          curl -o profile/contributors.svg "https://github-contributor-stats.vercel.app/api?username=daniellealpimenta&limit=5&theme=dark&combine_all_yearly_contributions=true"

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Garante que a pasta existe e adiciona os arquivos ao index
          mkdir -p profile
          git add profile/*.svg
          
          # Faz o stash (guarda) das imagens geradas para limpar o index
          git stash
          
          # Puxa as mudanças do seu README/Repo para evitar o erro de 'rejected'
          git pull --rebase origin main
          
          # Traz as imagens de volta
          git stash pop || echo "Sem mudanças no stash"
          
          # Adiciona novamente e commita
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
